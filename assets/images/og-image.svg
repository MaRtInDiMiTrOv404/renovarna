    <text x="80" y="350" font-family="Montserrat, Arial, sans-serif" font-size="72" font-weight="900" fill="#fff">Строим доверие,</text>
    <text x="80" y="430" font-family="Montserrat, Arial, sans-serif" font-size="72" font-weight="900" font-style="italic" fill="#00AEEF">ремонтираме</text>
    <text x="80" y="510" font-family="Montserrat, Arial, sans-serif" font-size="72" font-weight="900" fill="none" stroke="#fff" stroke-width="2">с качество.</text>
    <!-- Badge -->
