        <path d="M0 70 L50 20 L100 70 L90 70 L90 130 L10 130 L10 70 Z" 
              fill="url(#logoGrad)" stroke="#00AEEF" stroke-width="2" stroke-linejoin="round"/>
        <rect x="32" y="80" width="12" height="50" fill="#fff"/>
        <rect x="50" y="80" width="12" height="35" fill="#fff"/>
        <rect x="50" y="118" width="12" height="12" fill="#fff"/>
    </g>
    <text x="200" y="160" font-family="Montserrat, Arial, sans-serif" font-size="56" font-weight="900" fill="#fff">СТРОИТЕЛ<tspan fill="#00AEEF">ВАРНА</tspan></text>
    <text x="200" y="200" font-family="Inter, Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.6)" letter-spacing="2">РЕМОНТНИ ДЕЙНОСТИ · ОБЛАСТ ВАРНА</text>
