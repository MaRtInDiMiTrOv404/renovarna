            <stop offset="100%" stop-color="#1a3a5c"/>
        </linearGradient>
        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00AEEF"/>
            <stop offset="100%" stop-color="#0F2A44"/>
        </linearGradient>
    </defs>
    <rect width="1200" height="630" fill="url(#bg)"/>
    <!-- City silhouette -->
    <path d="M0 630 L0 480 L100 480 L100 420 L180 420 L180 460 L260 460 L260 380 L340 380 L340 420 L420 420 L420 350 L500 350 L500 400 L580 400 L580 370 L680 370 L680 430 L760 430 L760 400 L840 400 L840 460 L940 460 L940 420 L1020 420 L1020 480 L1100 480 L1100 510 L1200 510 L1200 630 Z" 
          fill="#0a1f33" opacity="0.6"/>
    <!-- Logo -->
